<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpSec | Internal Dashboard</title>
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            padding: 40px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .status-pill {
            background: #27ae60;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>

<body>
    <header>
        <h1>CorpSec Systems</h1>
        <div class="status-pill">SYSTEM SECURE</div>
    </header>
    <div class="container">
        <div class="card">
            <h2>Welcome, Administrator</h2>
            <p>You are currently logged into the **Secure Asset Manager v4.2**. All traffic is monitored and encrypted.
            </p>
        </div>
        <div class="grid">
            <div class="card">
                <h3>Server Health</h3>
                <p>Uptime: 99.9%</p>
                <p>CGI Gateway: <span style="color:green">Active</span></p>
            </div>
            <div class="card">
                <h3>Security Logs</h3>
                <p>Firewall: Enabled</p>
                <p>Intrusion Detection: Scanning...</p>
            </div>
        </div>
    </div>
</body>

</html>
